name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  compile:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-x64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            name: linux-arm64
            archive: tar.gz
          - target: x86_64-apple-darwin
            name: darwin-x64
            archive: tar.gz
          - target: aarch64-apple-darwin
            name: darwin-arm64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            name: windows-x64
            archive: zip
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      TARGET: ${{ matrix.target }}
      NAME: ${{ matrix.name }}
      ARCHIVE: ${{ matrix.archive }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${TAG#v}"
          binary="gh-workflow-explorer"
          case "$TARGET" in
            *windows*) binary="${binary}.exe" ;;
          esac
          deno compile \
            --allow-run=gh \
            --allow-env=NO_COLOR,HOME,PATH \
            --target "$TARGET" \
            --output "dist/${binary}" \
            src/main.ts
          stem="gh-workflow-explorer-${version}-${NAME}"
          cd dist
          if [ "$ARCHIVE" = "zip" ]; then
            zip "${stem}.zip" "${binary}"
          else
            tar -czf "${stem}.tar.gz" "${binary}"
          fi
          rm -f "${binary}"

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 * > "SHA256SUMS-${NAME}.txt"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" dist/* --clobber
